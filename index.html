<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Amir Mehdi Parviz · AI Developer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fira+Code:wght@300;400;500;600&family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #07090d;
      --surface: rgba(30, 36, 48, 0.98);
      --border: rgba(255,255,255,0.09);
      --border-accent: rgba(255, 135, 40, 0.4);
      --accent: #ff8728;
      --accent-dim: rgba(255, 135, 40, 0.13);
      --accent-glow: rgba(255, 135, 40, 0.2);
      --text: #eee8e0;
      --text-muted: #c4bdb5;
      --text-dim: #7a7470;
      --mono: 'Fira Code', 'DM Mono', monospace;
      --mono-alt: 'Fira Mono', 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --display: 'Syne', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Matrix Background ── */
    .matrix-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .matrix-bg::after {
      content: '';
      position: absolute; inset: 0;
      backdrop-filter: blur(1.5px);
      background: rgba(7, 9, 13, 0.32);
      pointer-events: none;
    }
    .matrix-codes {
      position: absolute; top: 0; left: 0;
      width: 100%; min-height: 100%;
      display: flex; flex-wrap: wrap;
      align-content: flex-start;
      gap: 0.5rem 1.1rem;
      padding: 2rem;
      font-family: 'Fira Mono', 'DM Mono', monospace;
      font-size: 0.76rem;
      font-weight: 400;
    }
    .code-fragment {
      opacity: 0;
      animation: matrixFade 5s infinite alternate;
      white-space: pre;
      display: inline-block;
      filter: blur(0.4px);
    }
    .code-fragment:nth-child(odd)   { color: rgba(60, 160, 220, 0.13); }
    .code-fragment:nth-child(3n)    { color: rgba(80, 200, 160, 0.11); }
    .code-fragment:nth-child(5n+2)  { color: rgba(100, 180, 255, 0.12); }
    .code-fragment:nth-child(7n+4)  { color: rgba(50, 220, 180, 0.10); }

    @keyframes matrixFade {
      0%   { opacity: 0; transform: translateY(10px); filter: blur(2px); }
      25%  { opacity: 1; transform: translateY(0); filter: blur(0.4px); }
      75%  { opacity: 0.7; transform: translateY(-4px); }
      100% { opacity: 0; transform: translateY(-14px); filter: blur(2.5px); }
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 10;
      max-width: 960px;
      width: 92%;
      margin: 0 auto;
      padding: 3.5rem 0 5rem;
    }

    /* ── Header / Hero ── */
    .hero {
      margin-bottom: 3rem;
      background: linear-gradient(135deg, rgba(30, 38, 54, 0.98) 0%, rgba(26, 32, 46, 0.98) 60%, rgba(36, 24, 14, 0.98) 100%);
      border: 1px solid rgba(255, 135, 40, 0.22);
      border-radius: 22px;
      padding: 2.6rem 2.8rem 2.2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 32px 64px rgba(0,0,0,0.55);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(255,135,40,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(255,135,40,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2rem;
      position: relative;
    }
    .hero-name {
      font-family: var(--display);
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.0;
      color: #f8f0e6;
    }
    .hero-name span {
      display: block;
      font-size: 0.42em;
      font-weight: 400;
      font-family: var(--mono);
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-bottom: 0.3em;
      opacity: 0.9;
    }
    .hero-tagline {
      font-family: var(--sans);
      font-size: 1rem;
      color: #c8c0b6;
      font-weight: 400;
      margin-top: 0.9rem;
      max-width: 440px;
      line-height: 1.6;
    }

    /* ── Contact Pills ── */
    .contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1.8rem;
      padding-top: 1.8rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    .contact-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: #c8bfb6;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .contact-pill i { color: var(--accent); font-size: 0.7rem; }
    .contact-pill:hover {
      color: #f8f0e6;
      border-color: var(--border-accent);
      background: var(--accent-dim);
    }

    /* ── Card ── */
    .card {
      background: rgba(38, 46, 62, 0.98);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 2.2rem 2.4rem;
      margin-bottom: 1.4rem;
      backdrop-filter: blur(20px);
      transition: border-color 0.3s;
    }
    .card:hover { border-color: var(--border-accent); }

    /* ── Section Titles ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.6rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-label i { font-size: 0.75rem; }

    /* ── Skills ── */
    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .skill-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      padding: 0.32rem 0.85rem;
      border-radius: 6px;
      transition: color 0.2s, border-color 0.2s;
    }
    .skill-tag:hover { color: var(--text); border-color: var(--border-accent); }
    .skill-tag i { color: var(--accent); font-size: 0.72rem; }

    /* ── Experience ── */
    .exp-item {
      padding-bottom: 1.6rem;
      margin-bottom: 1.6rem;
      border-bottom: 1px solid var(--border);
    }
    .exp-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .exp-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.6rem;
    }
    .exp-role {
      font-family: var(--display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }
    .exp-company {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
    }
    .exp-date {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .exp-desc {
      list-style: none;
      padding: 0;
      margin-top: 0.6rem;
    }
    .exp-desc li {
      display: flex;
      gap: 0.65rem;
      align-items: flex-start;
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      line-height: 1.55;
    }
    .exp-desc li::before {
      content: '—';
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 0.02em;
      font-family: var(--mono);
      font-size: 0.8rem;
    }

    /* ── Education ── */
    .edu-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .edu-degree {
      font-family: var(--display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }
    .edu-date {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .edu-uni {
      font-family: var(--sans);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* ── Repos ── */
    .repos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      padding: 0.4rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .repo-link i { color: var(--accent); }
    .repo-link:hover {
      color: var(--text);
      border-color: var(--border-accent);
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    /* ── Projects Grid ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .project-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      background: rgba(36, 44, 60, 0.96);
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }
    .project-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
    }
    .project-preview {
      aspect-ratio: 16/9;
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .project-preview img, .project-preview video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .project-preview-placeholder {
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 0.75rem;
    }
    .project-title {
      padding: 0.85rem 1rem;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .project-title i { color: var(--accent); font-size: 0.75rem; }

    /* ── Publication ── */
    .pub-card {
      padding: 1.8rem 2rem;
    }
    .pub-journal {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin-bottom: 0.7rem;
    }
    .pub-title {
      font-family: var(--display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 0.6rem;
    }
    .pub-authors {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .pub-authors strong { color: var(--text); }
    .pub-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 1.2rem;
    }
    .pub-meta span { display: inline-flex; align-items: center; gap: 0.4rem; }
    .pub-meta i { color: var(--accent); }

    .pub-highlights {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }
    .pub-highlight-item {
      display: flex;
      gap: 0.6rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .pub-highlight-item::before {
      content: '›';
      color: var(--accent);
      flex-shrink: 0;
      font-size: 1rem;
      line-height: 1.3;
    }

    .pub-abstract {
      font-size: 0.84rem;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 1.2rem;
      padding: 1rem 1.2rem;
      border-left: 2px solid var(--border-accent);
      background: var(--accent-dim);
      border-radius: 0 8px 8px 0;
    }

    .pub-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.74rem;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border-accent);
      padding: 0.4rem 1rem;
      border-radius: 6px;
      background: var(--accent-dim);
      transition: background 0.2s, color 0.2s;
    }
    .pub-link:hover { background: rgba(255,135,40,0.22); color: #ffaa55; }

    /* ── Modals ── */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(18px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: rgba(12, 16, 22, 0.98);
      border: 1px solid var(--border-accent);
      border-radius: 18px;
      overflow: hidden;
      width: 90%;
      max-width: 900px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 {
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted);
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body {
      padding: 1.5rem;
      text-align: center;
    }
    .modal-body img, .modal-body video {
      max-width: 100%; max-height: 72vh;
      border-radius: 10px;
    }

    /* ── Chat ── */
    .chat-overlay {
      display: none;
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .chat-overlay.open { display: flex; }

    .chat-box {
      background: rgba(10, 14, 20, 0.98);
      border: 1px solid var(--border-accent);
      border-radius: 18px;
      overflow: hidden;
      width: 90%;
      max-width: 520px;
    }
    .chat-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.3);
    }
    .chat-head-title {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .chat-head-title::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .chat-messages {
      height: 300px;
      overflow-y: auto;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .message {
      max-width: 84%;
      padding: 0.6rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .ai-message {
      align-self: flex-start;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      border-left: 2px solid var(--accent);
    }
    .user-message {
      align-self: flex-end;
      background: var(--accent-dim);
      border: 1px solid var(--border-accent);
      color: var(--text);
    }
    .typing-indicator {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      padding: 0.5rem 1rem;
    }
    .chat-input-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.9rem 1.2rem;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }
    .chat-input-row input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1rem;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input-row input:focus { border-color: var(--border-accent); }
    .chat-input-row input::placeholder { color: var(--text-dim); }
    .chat-send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 0 1.1rem;
      color: #080c10;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .chat-send-btn:hover { opacity: 0.85; }

    /* ── Floating Buddy ── */
    .ai-buddy-fixed {
      position: fixed;
      right: 28px;
      z-index: 1000;
      cursor: pointer;
      transition: top 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      will-change: top;
    }
    .pixel-mascot {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(8, 12, 16, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-accent);
      border-radius: 14px;
      padding: 8px 10px 6px;
      animation: floatBuddy 3s ease-in-out infinite;
      transition: border-color 0.2s, background 0.2s;
    }
    .pixel-mascot:hover {
      border-color: var(--accent);
      background: rgba(8,12,16,0.95);
    }
    @keyframes floatBuddy {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    canvas { image-rendering: pixelated; display: block; }
    .mascot-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--accent);
      margin-top: 4px;
      letter-spacing: 0.08em;
    }
    .mascot-hint {
      font-family: var(--mono);
      font-size: 0.52rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 3rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .page { width: 96%; padding: 2rem 0 4rem; }
      .card { padding: 1.6rem 1.4rem; }
      .pub-card { padding: 1.4rem; }
      .hero-name { font-size: 2.4rem; }
      .ai-buddy-fixed { right: 12px; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="matrix-bg"><div class="matrix-codes" id="matrixContainer"></div></div>

<div class="page">

  <!-- ── Hero ── -->
  <div class="hero">
    <div class="hero-top">
      <div>
        <h1 class="hero-name">
          <span>// AI Developer</span>
          Amir Mehdi<br>Parviz
        </h1>
        <p class="hero-tagline">Building intelligent systems at the intersection of deep learning, computer vision, and language models.</p>
      </div>
    </div>
    <div class="contacts">
      <span class="contact-pill"><i class="fas fa-phone-al
